<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报价系统</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2329;
        --muted: #646a73;
        --line: #dee0e3;
        --primary: #3370ff;
        --primary2: #2b5dd4;
        --ok: #00b42a;
        --err: #f53f3f;
      }

      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 6px 20px rgba(31, 35, 41, 0.06);
        max-width: 520px;
        margin: 0 auto;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 12px 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .tag {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
      }

      .section {
        margin-top: 14px;
      }

      .label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      select,
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 14px;
        background: #fff;
        outline: none;
      }

      select:focus,
      input:focus {
        border-color: rgba(51, 112, 255, 0.6);
        box-shadow: 0 0 0 3px rgba(51, 112, 255, 0.12);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        line-height: 1.5;
      }

      .products {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        max-height: 280px;
        overflow: auto;
        background: #fff;
      }

      .row {
        display: grid;
        grid-template-columns: 20px 1fr 88px;
        gap: 10px;
        align-items: center;
        padding: 10px 8px;
        border-bottom: 1px solid rgba(222, 224, 227, 0.6);
      }

      .row:last-child {
        border-bottom: none;
      }

      .pname {
        font-size: 14px;
        font-weight: 600;
      }

      .pmeta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }

      .qty {
        width: 88px;
        padding: 8px 10px;
        border-radius: 10px;
      }

      .btn {
        margin-top: 14px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }

      .btn:hover {
        background: var(--primary2);
      }

      .msg {
        display: none;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
      }

      .msg.ok {
        display: block;
        background: rgba(0, 180, 42, 0.08);
        color: var(--ok);
        border: 1px solid rgba(0, 180, 42, 0.25);
      }

      .msg.err {
        display: block;
        background: rgba(245, 63, 63, 0.08);
        color: var(--err);
        border: 1px solid rgba(245, 63, 63, 0.25);
      }
    </style>
  </head>

  <body>
  <div class="container">
    <h2>📋 报价系统</h2>

    <div class="section">
      <h3>步骤1：选择产品库表</h3>
      <select id="tableSelect" class="select-box">
        <option value="">请选择产品库表...</option>
      </select>
      <p class="hint">提示：这里会列出当前多维表格文件里的所有数据表。</p>
    </div>

    <div class="section">
      <h3>步骤2：选择产品</h3>
      <div id="productList" class="product-list">
        <p class="hint">请先选择产品库表</p>
      </div>
    </div>

    <div class="section">
      <h3>步骤3：客户信息</h3>
      <input type="text" id="customerName" placeholder="请输入客户名称" class="input-box" />
    </div>

    <div class="section">
      <button id="generateQuote" class="btn-primary">🎯 生成报价单</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <!-- 1) 先把 Base JS SDK 注入到 window.bitable（给 app.js 用） -->
<script type="module">
  import { bitable } from "https://cdn.jsdelivr.net/npm/@lark-base-open/js-sdk@1.0.2/dist/index.mjs";
  window.bitable = bitable;
</script>

<!-- 2) 再加载你的业务逻辑 -->
<script src="./app.js" defer></script>
</body>
</html>
