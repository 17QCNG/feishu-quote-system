<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报价系统</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2329;
        --muted: #646a73;
        --line: #dee0e3;
        --primary: #3370ff;
        --primary2: #2b5dd4;
        --ok: #00b42a;
        --err: #f53f3f;
      }

      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 6px 20px rgba(31, 35, 41, 0.06);
      }

      h2 {
        margin: 0 0 12px 0;
        font-size: 20px;
      }

      h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
      }

      .section {
        margin-top: 14px;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        line-height: 1.5;
      }

      .rowline {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .smallbtn {
        padding: 8px 10px;
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        color: var(--text);
      }

      .smallbtn:hover {
        background: #f7f8fa;
      }

      .tables {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: #fff;
        max-height: 200px;
        overflow: auto;
      }

      .table-item {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 6px 4px;
        border-bottom: 1px solid rgba(222, 224, 227, 0.6);
      }

      .table-item:last-child {
        border-bottom: none;
      }

      .table-name {
        font-size: 13px;
      }

      .products {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        max-height: 340px;
        overflow: auto;
        background: #fff;
      }

      .prow {
        display: grid;
        grid-template-columns: 20px 1fr 88px;
        gap: 10px;
        align-items: center;
        padding: 10px 8px;
        border-bottom: 1px solid rgba(222, 224, 227, 0.6);
      }

      .prow:last-child {
        border-bottom: none;
      }

      .pname {
        font-size: 14px;
        font-weight: 600;
      }

      .pmeta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
        line-height: 1.5;
      }

      .qty {
        width: 88px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
      }

      .input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        box-sizing: border-box;
        font-size: 13px;
      }

      .btn {
        margin-top: 14px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }

      .btn:hover {
        background: var(--primary2);
      }

      .msg {
        display: none;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        white-space: pre-wrap;
      }

      .msg.ok {
        display: block;
        background: rgba(0, 180, 42, 0.08);
        color: var(--ok);
        border: 1px solid rgba(0, 180, 42, 0.25);
      }

      .msg.err {
        display: block;
        background: rgba(245, 63, 63, 0.08);
        color: var(--err);
        border: 1px solid rgba(245, 63, 63, 0.25);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>📋 报价系统</h2>

      <div class="section">
        <h3>报价单设置</h3>
        <input
          id="quoteFileName"
          class="input"
          type="text"
          placeholder="例如：XX项目报价单（导出为 .xlsx）"
        />
        <div class="hint">
          该名称会写入表头上方标题行，并作为导出文件名（自动追加 .xlsx）。
        </div>
      </div>

      <div class="section">
        <h3>步骤1：选择产品库表（可多选）</h3>

        <div class="rowline">
          <button id="selectAllTables" class="smallbtn" type="button">全选</button>
          <button id="clearAllTables" class="smallbtn" type="button">全不选</button>
          <button id="reloadProducts" class="smallbtn" type="button">重新加载产品</button>
        </div>

        <div id="tableList" class="tables">
          <div class="hint">加载中...</div>
        </div>

        <div class="hint">
          输出列固定为：科目、产品名称、尺寸/天数、数量、单位、成本单价、成本总价(公式)、单价、总价(公式)、产品描述。<br />
          产品归类分组按“产品类型=数据表名”进行，导出时会自动排除括号中的供应商后再分组（例如：物料搭建（AI杨总）与物料搭建（建桥）都会归并为物料搭建）。
        </div>
      </div>

      <div class="section">
        <h3>步骤2：选择产品</h3>
        <div id="productList" class="products">
          <div class="hint">请先在步骤1勾选至少一个数据表</div>
        </div>
      </div>

      <button id="exportXlsx" class="btn" type="button">📤 导出报价单 XLSX（带公式）</button>

      <div id="message" class="msg"></div>
    </div>

    <!-- ExcelJS：生成 .xlsx（支持合并单元格/样式/列宽/行高/自动换行） -->
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

    <!-- 注入 Base JS SDK 到 window.bitable -->
    <script type="module">
      import { bitable } from "https://cdn.jsdelivr.net/npm/@lark-base-open/js-sdk@1.0.2/dist/index.mjs";
      window.bitable = bitable;
    </script>

    <script src="./app.js" defer></script>
  </body>
</html>
